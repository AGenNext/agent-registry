name: CI

on:
  push:
    branches: [main, master, prod-ready-site]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    name: Web build and quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  python-policy:
    name: Existing repository policy checks
    uses: AGenNext/AGenNext-CodeReview/.github/workflows/reusable-ci.yml@main
    with:
      language: python
